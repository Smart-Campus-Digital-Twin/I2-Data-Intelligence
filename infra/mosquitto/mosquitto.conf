# Mosquitto MQTT Broker Configuration
# For Smart Campus Digital Twin development environment
# Config: Allow anonymous connections, persistence enabled, performance tuned
 
# ============================================================================
# Listener Configuration
# ============================================================================
 
# Standard MQTT listener on port 1883
listener 1883
protocol mqtt
 
# WebSocket listener on port 9001
listener 9001
protocol websockets
 
# ============================================================================
# Security Configuration
# ============================================================================
 
# Allow anonymous connections (for development only)
allow_anonymous true
 
# ============================================================================
# Message Configuration
# ============================================================================
 
# Maximum inflight messages (number of messages that can be sent without being ack'd)
max_inflight_messages 20
 
# Maximum queued messages (for offline clients)
max_queued_messages 100
 
 
# ============================================================================
# Persistence Configuration
# ============================================================================
 
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db
autosave_interval 1800
 
# ============================================================================
# Logging Configuration
# ============================================================================
 
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
 
# ============================================================================
# Performance Tuning
# ============================================================================
 
max_connections 100