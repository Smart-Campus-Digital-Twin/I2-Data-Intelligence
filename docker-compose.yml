# I2-Data-Intelligence — Complete Local Development Stack
# Services: TimescaleDB, Redis, Kafka, Schema Registry, MQTT, MLflow, InfluxDB, Socket.IO

version: '3.8'

services:
  # ============================================================================
  # ZOOKEEPER-FREE KAFKA (KRaft mode)
  # ============================================================================
  kafka:
    image: bitnami/kafka:3.6
    container_name: i2-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_BROKER_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CFG_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:29093,PLAINTEXT_HOST://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LOG_DIRS: /bitnami/kafka/data
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 1
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/bitnami/kafka/data
    networks:
      - dev-tools
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # SCHEMA REGISTRY
  # ============================================================================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6
    container_name: i2-schema-registry
    hostname: schema-registry
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_DEBUG: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - dev-tools
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # MQTT BROKER
  # ============================================================================
  mqtt:
    image: eclipse-mosquitto:2
    container_name: i2-mqtt
    hostname: mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-data:/mosquitto/data
      - mqtt-logs:/mosquitto/log
    networks:
      - dev-tools
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "test", "-C", "1", "-W", "1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # TIMESCALEDB (Main Analytics Database)
  # ============================================================================
  timescaledb:
    image: timescale/timescaledb:2.14-pg16
    container_name: i2-timescaledb
    hostname: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campustwin}
      POSTGRES_USER: ${POSTGRES_USER:-ctuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ctpass}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./schema/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    networks:
      - dev-tools
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ctuser", "-d", "campustwin"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # REDIS 7.2 (Cache & Pub/Sub)
  # ============================================================================
  redis:
    image: redis:7.2-alpine
    container_name: i2-redis
    hostname: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --notify-keyspace-events Kex
    volumes:
      - redis-data:/data
    networks:
      - dev-tools
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # MINIO (S3-compatible storage for MLflow)
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: i2-minio
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /minio-data --console-address ":9001"
    volumes:
      - minio-data:/minio-data
    networks:
      - dev-tools
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # POSTGRES (MLflow backend database)
  # ============================================================================
  mlflow-postgres:
    image: postgres:16-alpine
    container_name: i2-mlflow-postgres
    hostname: mlflow-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    volumes:
      - mlflow-postgres-data:/var/lib/postgresql/data
    networks:
      - dev-tools
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mlflow", "-d", "mlflow"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # MLFLOW TRACKING SERVER
  # ============================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: i2-mlflow
    hostname: mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_TRACKING_URI: postgresql://mlflow:mlflow@mlflow-postgres:5432/mlflow
      MLFLOW_BACKEND_STORE_URI: postgresql://mlflow:mlflow@mlflow-postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow/artifacts
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: mlflow server --backend-store-uri postgresql://mlflow:mlflow@mlflow-postgres:5432/mlflow --default-artifact-root s3://mlflow/artifacts --host 0.0.0.0
    depends_on:
      mlflow-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dev-tools
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # INFLUXDB 2.7
  # ============================================================================
  influxdb:
    image: influxdb:2.7
    container_name: i2-influxdb
    hostname: influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: campus_iot
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: adminpass
      INFLUXDB_ADMIN_RETENTION_POLICY: 30d
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - dev-tools
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # SOCKET.IO REAL-TIME RELAY (I2-T6)
  # ============================================================================
  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    container_name: i2-realtime
    hostname: realtime
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dev-tools
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

# ============================================================================
# VOLUMES
# ============================================================================

volumes:
  kafka-data:
    driver: local
  mqtt-data:
    driver: local
  mqtt-logs:
    driver: local
  timescaledb-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  mlflow-postgres-data:
    driver: local
  influxdb-data:
    driver: local

# ============================================================================
# NETWORKS
# ============================================================================

networks:
  dev-tools:
    driver: bridge
